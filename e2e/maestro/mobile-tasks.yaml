appId: com.fieldservice.app
---
- launchApp
- runFlow: mobile-auth.yaml
- tapOn:
    id: "tab-tasks"
- assertVisible: "All Tasks"
- tapOn:
    id: "tasks-filter-button"
- assertVisible: "Filter Tasks"
- tapOn: "Close"
- scrollUntilVisible:
    element:
      text: "Test Task"
    direction: DOWN
- tapOn: "Test Task"
- assertVisible: "Task Detail"
- tapOn: "Start Work"
- assertVisible: "IN PROGRESS"
- tapOn: "Complete Task"
- assertVisible: "Create Report"
