appId: com.fieldservicemonorepo
---
- runFlow: login-technician.yaml
- tapOn:
    id: "tab-tasks"
- assertVisible: "All Tasks"
- tapOn:
    id: "tasks-filter-button"
- assertVisible: "Filter Tasks"
- tapOn: "Close"
- assertVisible:
    id: "task-card"
- tapOn:
    id: "task-card"
- assertVisible:
    id: "task-detail-screen"
- assertVisible: "Task Detail"
- assertVisible: "Work Description"
- assertVisible: "Customer Contact"
- assertVisible: "Work Location"
- tapOn:
    id: "task-detail-back-button"
- assertVisible: "All Tasks"
