appId: com.fieldservice.app
---
- launchApp
- runFlow: mobile-auth.yaml
- tapOn:
    id: "tab-tasks"
- assertVisible: "All Tasks"
- setAirplaneMode: true
- tapOn:
    id: "tasks-filter-button"
- tapOn: "Close"
- assertVisible: "Offline"
- setAirplaneMode: false
- waitForAnimationToEnd
- assertNotVisible: "Offline"
- assertVisible: "All Tasks"
